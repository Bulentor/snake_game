<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Змейка: Сквозь стены</title>
    <style>
        body { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #121212; color: #fff; font-family: sans-serif; }
        canvas { border: 4px solid #9b59b6; background: #000; }
        .ui { margin-bottom: 10px; text-align: center; }
        .record { color: #f1c40f; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="ui">
        <div>Счет: <span id="score">0</span> | Уровень: <span id="level">1</span></div>
        <div class="record">Рекорд: <span id="best">0</span></div>
    </div>
    <canvas id="game" width="400" height="400"></canvas>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        const box = 20;

        let score = 0;
        let level = 1;
        let snake = [{x: 10 * box, y: 10 * box}];
        let food = { x: 5 * box, y: 5 * box };
        let obstacles = []; // Массив для стен
        let d = "RIGHT";
        let nextD = "RIGHT"; // Для предотвращения резкого разворота в себя
        let gameLoop;
        let speed = 120;

        document.addEventListener("keydown", e => {
            if (e.keyCode == 37 && d != "RIGHT") nextD = "LEFT";
            else if (e.keyCode == 38 && d != "DOWN") nextD = "UP";
            else if (e.keyCode == 39 && d != "LEFT") nextD = "RIGHT";
            else if (e.keyCode == 40 && d != "UP") nextD = "DOWN";
        });

        function generateObstacles() {
            obstacles = [];
            // Создаем препятствия в зависимости от уровня
            for(let i = 0; i < level - 1; i++) {
                obstacles.push({
                    x: Math.floor(Math.random() * 18 + 1) * box,
                    y: Math.floor(Math.random() * 18 + 1) * box
                });
            }
        }

        function draw() {
            d = nextD;
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Рисуем препятствия
            ctx.fillStyle = "#95a5a6";
            obstacles.forEach(obs => ctx.fillRect(obs.x, obs.y, box, box));

            // Еда
            ctx.fillStyle = "#e74c3c";
            ctx.fillRect(food.x, food.y, box, box);

            // Змейка
            snake.forEach((part, index) => {
                ctx.fillStyle = index === 0 ? "#9b59b6" : "#8e44ad";
                ctx.fillRect(part.x, part.y, box-1, box-1);
            });

            let headX = snake[0].x;
            let headY = snake[0].y;

            if (d === "LEFT") headX -= box;
            if (d === "UP") headY -= box;
            if (d === "RIGHT") headX += box;
            if (d === "DOWN") headY += box;

            // --- ПРОХОД СКВОЗЬ СТЕНЫ ---
            if (headX < 0) headX = canvas.width - box;
            else if (headX >= canvas.width) headX = 0;
            if (headY < 0) headY = canvas.height - box;
            else if (headY >= canvas.height) headY = 0;

            let newHead = {x: headX, y: headY};

            // ПРОВЕРКА СТОЛКНОВЕНИЙ (собой или препятствием)
            const hitSelf = snake.some(p => p.x === newHead.x && p.y === newHead.y);
            const hitWall = obstacles.some(w => w.x === newHead.x && w.y === newHead.y);

            if (hitSelf || hitWall) {
                clearInterval(gameLoop);
                if(score > (localStorage.getItem("snakeBest") || 0)) localStorage.setItem("snakeBest", score);
                alert("Game Over!");
                location.reload();
            }

            if (headX === food.x && headY === food.y) {
                score++;
                document.getElementById("score").innerText = score;
                if(score % 3 === 0) {
                    level++;
                    document.getElementById("level").innerText = level;
                    generateObstacles();
                    speed = Math.max(60, speed - 10);
                    clearInterval(gameLoop);
                    gameLoop = setInterval(draw, speed);
                }
                food = {
                    x: Math.floor(Math.random() * 19) * box,
                    y: Math.floor(Math.random() * 19) * box
                };
            } else {
                snake.pop();
            }

            snake.unshift(newHead);
        }

        document.getElementById("best").innerText = localStorage.getItem("snakeBest") || 0;
        gameLoop = setInterval(draw, speed);
    </script>
</body>
</html>
